name: Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y cmake libssl-dev

      - name: Configure
        run: cmake -S . -B build -DCMAKE_CXX_FLAGS="-Wall -Wextra"

      - name: Build
        run: cmake --build build
